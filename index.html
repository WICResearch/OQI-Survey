<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WIC OQI Staff Survey</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<main class="container">

<section id="introPage" class="intro-card">
<div class="logo-row">
<img src="New Dept of Health Logo_horz_RGB.jpg" class="logo">
<img src="WIC-Color.jpg" class="logo">
</div>

<div class="intro-banner">
<h1>2026 WV WIC OQI Survey</h1>
<p>Office of Quality Improvement</p>
</div>

<p class="intro-text">
Your feedback helps guide future WIC quality improvement efforts.
</p>

<p class="intro-note">
This survey takes approximately 10–15 minutes.
</p>

<button type="button" id="beginSurveyBtn">Begin Survey</button>
</section>


<form id="surveyForm" style="display:none;"> 
<div class="progress-text" id="progressText"></div>
<div class="progress-bar">
<div id="progressFill"></div>
</div>

<section id="questionCard" class="question-card"></section>

<div class="button-row">
<button type="button" id="backBtn">Back</button>
<button type="button" id="nextBtn">Next</button>
<button type="submit" id="submitBtn">Submit Survey</button>
</div>

<p id="message"></p>
</form>
</main>

<script src="script.js"></script>
</body>
</html>
