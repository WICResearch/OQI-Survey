<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WIC OQI Staff Survey</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<main class="container">
<div class="survey-header">

<div class="logo-row">

<img src="wv-logo.png" class="logo">

<img src="wic-logo.png" class="logo">

</div>

<h1>Office of Quality Improvement</h1>

<h2>2026 WIC Staff Survey</h2>

<p>
Your feedback will help improve services for WIC staff and families throughout West Virginia.
</p>

</div>
<p>
This survey gathers staff feedback on current needs for the State Agency,
Local Agencies, and WIC participants.
</p>
</div>

<form id="surveyForm">
<div class="progress-text" id="progressText"></div>
<div class="progress-bar">
<div id="progressFill"></div>
</div>

<section id="questionCard" class="question-card"></section>

<div class="button-row">
<button type="button" id="backBtn">Back</button>
<button type="button" id="nextBtn">Next</button>
<button type="submit" id="submitBtn">Submit Survey</button>
</div>

<p id="message"></p>
</form>
</main>

<script src="script.js"></script>
</body>
</html>
